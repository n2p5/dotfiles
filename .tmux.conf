# Modern terminal + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Clipboard - cross-platform
if-shell "command -v pbcopy" \
  "set -s copy-command 'pbcopy'" \
  "if-shell 'command -v wl-copy' \
    'set -s copy-command wl-copy' \
    'set -s copy-command \"xclip -selection clipboard\"'"

# Address vim mode switching delay
set -sg escape-time 0

# Increase scrollback
set -g history-limit 50000

# Start windows/panes at 1 instead of 0 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Prefix: Ctrl-a (easier reach than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Intuitive splits that preserve cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with repeatable bindings
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support (useful for scrolling, resizing)
set -g mouse on

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Quick config reload
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Don't rename windows automatically
set -g allow-rename off

# Reduce repeat-time (default 500ms feels sluggish)
set -g repeat-time 300

# Focus events for vim/neovim autoread
set -g focus-events on

# Status bar - clean and minimal
set -g status-style "bg=default,fg=white"
set -g status-left "#[bold]#S "
set -g status-right "%H:%M"
set -g status-left-length 20